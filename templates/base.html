<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{block "title" .}}lectures.nz{{end}}</title>
  <meta name="description" content="{{block "description" .}}Upcoming public lectures in New Zealand — universities, institutes, and cultural organisations.{{end}}">
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="alternate" type="text/calendar" href="/calendar.ics" title="lectures.nz calendar">
  <link rel="alternate" type="application/rss+xml" href="/rss.xml" title="lectures.nz RSS">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="site-logo">
        <span class="logo-mark">▶</span>
        <span class="logo-text">lectures.nz</span>
      </a>
      <div class="header-search">
        <label for="search" class="sr-only">Search lectures</label>
        <input
          type="search"
          id="search"
          placeholder="Search lectures…"
          autocomplete="off"
          spellcheck="false"
        >
      </div>
      <button id="city-pill" class="city-pill" type="button">📍 All cities</button>
      <nav class="header-nav">
        <a href="/calendar.ics" class="nav-link" title="Subscribe to calendar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
          </svg>
          Calendar
        </a>
      </nav>
    </div>
  </header>

  <main class="site-main">
    {{block "main" .}}{{end}}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p>
        Upcoming public lectures in New Zealand.
        <a href="/calendar.ics">Subscribe to calendar</a>.
      </p>
      <p class="footer-hosts">
        Sources:
        {{range .Hosts}}<a href="/{{.Slug}}/">{{.Name}}</a> {{end}}
      </p>
      <p class="footer-meta">
        <a href="https://github.com/sponsors/jtrotsky" class="sponsor-link" target="_blank" rel="noopener">
          ♥ Support this project
        </a>
        &nbsp;·&nbsp;
        <a href="https://github.com/jtrotsky/lectures.nz">Open source</a>.
        Data updated daily.
      </p>
    </div>
  </footer>

  <script>
    // Embed lecture data for client-side search
    window.LECTURES_DATA = {{.LecturesJSON}};
  </script>
  <script src="/static/js/app.js"></script>
</body>
</html>
