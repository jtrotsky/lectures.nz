name: Collect, Build & Deploy

on:
  push:
    branches: [main]
  schedule:
    # Daily at 6:00 AM NZST = 18:00 UTC (previous day)
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  collect-build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
        continue-on-error: true

      - name: Collect lectures
        id: collect
        env:
          EVENTBRITE_TOKEN: ${{ secrets.EVENTBRITE_SECRET }}
        run: |
          go run ./cmd/collect 2>&1 | tee /tmp/collect.log
          # Write skipped events to the job summary
          echo "## Collect run summary" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E 'OK|ERROR|SKIP|Wrote' /tmp/collect.log >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
        timeout-minutes: 5

      - name: Restore enrichment cache
        uses: actions/cache@v4
        with:
          path: data/enriched-cache.json
          key: enrichment-cache-${{ github.run_id }}
          restore-keys: enrichment-cache-

      - name: Enrich lectures
        env:
          OLLAMA_HOST: ${{ secrets.OLLAMA_HOST }}
        run: |
          if curl -sf "${OLLAMA_HOST}/api/version" > /dev/null 2>&1; then
            python3 scripts/enrich.py && cp data/lectures-enriched.json data/lectures.json
            echo "Enrichment complete" >> $GITHUB_STEP_SUMMARY
          else
            echo "Ollama unreachable — deploying without enrichment" >> $GITHUB_STEP_SUMMARY
          fi
        timeout-minutes: 30

      - name: Build site
        run: go run ./cmd/build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: lectures-nz
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
