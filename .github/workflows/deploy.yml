name: Collect, Build & Deploy

on:
  push:
    branches: [main]
  schedule:
    # Daily at 6:00 AM NZST = 18:00 UTC (previous day)
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  collect-build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Collect lectures
        id: collect
        env:
          EVENTBRITE_TOKEN: ${{ secrets.EVENTBRITE_SECRET }}
        run: |
          go run ./cmd/collect 2>&1 | tee /tmp/collect.log
          # Write skipped events to the job summary
          echo "## Collect run summary" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E 'OK|ERROR|SKIP|Wrote' /tmp/collect.log >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
        timeout-minutes: 5

      - name: Apply enrichment cache
        run: |
          python3 scripts/enrich.py

      - name: Build site
        run: go run ./cmd/build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: lectures-nz
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
