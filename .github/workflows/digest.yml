name: Weekly Digest

on:
  # Wednesday 5:30pm NZST (UTC+12) = Wednesday 05:30 UTC
  # During NZDT (Oct–Apr, UTC+13) this fires at 4:30pm — acceptable drift
  schedule:
    - cron: "30 5 * * 3"
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Collect lectures
        env:
          EVENTBRITE_TOKEN: ${{ secrets.EVENTBRITE_SECRET }}
        run: go run ./cmd/collect
        timeout-minutes: 5

      - name: Apply enrichment cache
        run: go run ./cmd/enrich

      - name: Send weekly digest
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
        run: go run ./cmd/digest
